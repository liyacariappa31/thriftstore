<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CART - Digital & Physical Objects</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Segoe UI", Arial, sans-serif;
            background: #040713;
            color: #f6f1e8;
            overflow-x: hidden;
        }

        main {
            position: relative;
            width: 100%;
            background: black;
        }

        /* HERO SECTION */
        .hero-section {
            position: relative;
            height: 100vh;
            width: 100%;
            overflow: hidden;
            background: white;
            color: black;
        }

        .hero-background {
            position: absolute;
            inset: 0;
            z-index: 0;
            background: white;
            filter: contrast(250%) grayscale(100%);
        }

        .hero-content {
            position: absolute;
            inset: 0;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            mix-blend-mode: difference;
            color: white;
            user-select: none;
        }

        .hero-typography {
            display: flex;
            width: 100%;
            max-width: 95vw;
            flex-direction: column;
            align-items: stretch;
            justify-content: center;
            padding: 0 1rem;
            margin-top: 2rem;
        }

        @media (min-width: 768px) {
            .hero-typography {
                max-width: 85vw;
                padding: 0;
            }
        }

        .hero-title {
            font-size: 18vw;
            font-weight: 900;
            line-height: 0.75;
            letter-spacing: -0.02em;
            text-transform: uppercase;
        }

        @media (min-width: 768px) {
            .hero-title {
                font-size: 14vw;
            }
        }

        .hero-title.italic {
            font-style: italic;
        }

        .hero-title.center {
            align-self: center;
            margin-top: 0.5rem;
        }

        @media (min-width: 768px) {
            .hero-title.center {
                margin-top: 0.5rem;
                transform: translateX(3rem);
            }
        }

        .hero-row {
            display: flex;
            width: 100%;
            justify-content: space-between;
            align-items: center;
            margin-top: 0.5rem;
        }

        .hero-title.line-through {
            text-decoration: line-through;
            text-decoration-thickness: 2rem;
            text-underline-offset: 0.5rem;
        }

        @media (min-width: 768px) {
            .hero-title.line-through {
                text-decoration-thickness: 4rem;
            }
        }

        .hero-marquee {
            position: absolute;
            bottom: 10vh;
            width: 100%;
            overflow: hidden;
            border-top: 1px solid white;
            border-bottom: 1px solid white;
            padding: 0.5rem 0;
            display: flex;
            white-space: nowrap;
            background: white;
            color: black;
            mix-blend-mode: normal;
            z-index: 20;
        }

        @media (min-width: 768px) {
            .hero-marquee {
                bottom: 2rem;
            }
        }

        .marquee-content {
            display: flex;
            animation: scroll 20s linear infinite;
            font-family: monospace;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-weight: bold;
        }

        @media (min-width: 768px) {
            .marquee-content {
                font-size: 0.875rem;
            }
        }

        .marquee-item {
            margin: 0 1rem;
            white-space: nowrap;
        }

        @keyframes scroll {
            0% {
                transform: translateX(0);
            }
            100% {
                transform: translateX(-50%);
            }
        }

        /* FOOTER */
        footer {
            position: relative;
            z-index: 20;
            width: 100%;
            background: black;
            color: white;
            padding: 3rem 1rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            gap: 1.5rem;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-family: monospace;
        }

        @media (min-width: 768px) {
            footer {
                flex-direction: row;
                padding: 3rem 3rem;
            }
        }

        @media (min-width: 1280px) {
            footer {
                padding: 3rem 6rem;
            }
        }

        .footer-links {
            display: flex;
            gap: 2rem;
        }

        .footer-links a {
            color: white;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .footer-links a:hover {
            color: #a0a0a0;
        }

        /* ARCHIVE TAG */
        .archive-tag {
            position: absolute;
            top: 8rem;
            left: 2rem;
            font-size: 0.75rem;
            font-family: monospace;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            transform: rotate(-90deg);
            transform-origin: left top;
            opacity: 0.6;
            display: none;
        }

        @media (min-width: 640px) {
            .archive-tag {
                display: block;
            }

            .archive-tag {
                left: 6rem;
            }
        }
    </style>
</head>
<body>
    <main>
        <!-- HERO SECTION -->
        <section class="hero-section">
            <!-- Background Layer -->
            <div class="hero-background"></div>

            <!-- Hero Content -->
            <div class="hero-content">
                <div class="archive-tag">[ ARCHIVE / 001 ]</div>

                <div class="hero-typography">
                    <h1 class="hero-title italic">PLAYING</h1>
                    <h1 class="hero-title center">TOMORROW</h1>
                    <div class="hero-row">
                        <h1 class="hero-title line-through">FOR</h1>
                        <h1 class="hero-title italic">TODAY!</h1>
                    </div>
                </div>

                <!-- Marquee Banner -->
                <div class="hero-marquee">
                    <div class="marquee-content">
                        <span class="marquee-item">⋆ SHOP THE COLLECTION</span>
                        <span class="marquee-item">⋆ FREE WORLDWIDE SHIPPING</span>
                        <span class="marquee-item">⋆ GEN-Z APPROVED</span>
                        <span class="marquee-item">⋆ DIGITAL MAKERS</span>
                        <span class="marquee-item">⋆ SHOP THE COLLECTION</span>
                        <span class="marquee-item">⋆ FREE WORLDWIDE SHIPPING</span>
                        <span class="marquee-item">⋆ GEN-Z APPROVED</span>
                        <span class="marquee-item">⋆ DIGITAL MAKERS</span>
                    </div>
                </div>
            </div>
        </section>

        <!-- FOOTER -->
        <footer>
            <p>© 2026 CART E-COMMERCE.</p>
            <div class="footer-links">
                <a href="#">Instagram</a>
                <a href="#">Twitter</a>
                <a href="#">LinkedIn</a>
            </div>
            <p>Miami — Paris — Tokyo</p>
        </footer>
    </main>
</body>
</html>
